<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:">
  <title>Catalogue client</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --gold:  #c8a96e;
      --black: #1a1a1a;
      --gray:  #555;
      --light: #aaa;
      --sans:  -apple-system, 'Helvetica Neue', Arial, sans-serif;
      --serif: Georgia, 'Times New Roman', serif;
    }

    /* ── TOOLBAR ── */
    .toolbar {
      position: fixed; top: 0; left: 0; right: 0; height: 48px;
      background: #1e3a5f;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 20px; z-index: 9999; gap: 12px;
    }
    .toolbar-title { color: white; font-size: 13px; font-weight: 600; flex: 1; }
    .toolbar-actions { display: flex; gap: 8px; align-items: center; }
    .tbtn { padding: 5px 14px; border: none; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: 600; }
    .tbtn-pdf   { background: #f59e0b; color: #1a1a1a; }
    .tbtn-print { background: white;   color: #1e3a5f; }
    .tbtn-close { background: rgba(255,255,255,0.15); color: white; }
    .toolbar-info { color: rgba(255,255,255,0.6); font-size: 11px; }

    body {
      font-family: var(--sans);
      background: #e8e8e8;
      padding-top: 56px;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }

    @media print {
      .toolbar { display: none !important; }
      body { background: white; padding-top: 0; }
      .cat-page { break-after: page; box-shadow: none; margin: 0; }
      .cat-page:last-child { break-after: avoid; }
    }

    @page { size: A4 portrait; margin: 0; }

    /* ── WRAPPER ── */
    .catalogue-pages { display: flex; flex-direction: column; gap: 12px; align-items: center; padding: 12px 0 24px; }

    /* ── PAGE A4 ── */
    .cat-page {
      width: 210mm;
      height: 297mm;
      background: white;
      box-shadow: 0 2px 20px rgba(0,0,0,0.18);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── EN-TÊTE DE PAGE ── */
    .page-header {
      padding: 10px 22px;
      border-bottom: 2px solid var(--gold);
      display: flex; align-items: center; justify-content: space-between; gap: 16px;
      flex-shrink: 0;
    }
    .ph-logo img { height: 40px; width: 40px; object-fit: contain; display: block; }
    .ph-logo-ph {
      height: 40px; width: 40px; background: #f0f0f0;
      display: flex; align-items: center; justify-content: center;
      color: #ccc; font-size: 7px; letter-spacing: 1px; text-transform: uppercase;
    }
    .ph-company { flex: 1; padding: 0 16px; }
    .ph-company-name { font-size: 14px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--black); }
    .ph-company-sub  { font-size: 8px; color: var(--light); margin-top: 2px; }
    .ph-right { text-align: right; }
    .ph-title { font-size: 9px; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; color: var(--gold); }
    .ph-date  { font-size: 7.5px; color: var(--light); margin-top: 2px; }
    .ph-page  { font-size: 7.5px; color: var(--light); margin-top: 1px; }

    /* ── CONTAINER 2 PRODUITS ── */
    .products-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── CARD PRODUIT (moitié de page) ── */
    .product-card {
      flex: 1;
      display: flex;
      flex-direction: column;
      border-top: 1px solid #ececec;
      overflow: hidden;
      padding: 10px 22px;
      gap: 8px;
    }
    .product-card:first-child { border-top: none; }

    /* Séparateur doré entre les 2 produits */
    .card-divider {
      height: 1px;
      background: linear-gradient(to right, transparent, var(--gold), transparent);
      flex-shrink: 0;
    }

    /* En-tête produit */
    .pc-header { flex-shrink: 0; }
    .pc-collection { font-size: 8px; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; color: var(--gold); margin-bottom: 2px; }
    .pc-name { font-family: var(--serif); font-size: 20px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--black); line-height: 1.1; }

    /* Photo pleine largeur en haut de la fiche */
    .pc-photo {
      width: 100%; height: 100px; flex-shrink: 0;
      background: #f7f7f7;
      display: flex; align-items: center; justify-content: center;
      border: 1px solid #ececec; overflow: hidden;
    }
    .pc-photo img { max-width: 100%; max-height: 100%; object-fit: contain; }
    .pc-photo-ph { color: #ccc; font-size: 9px; letter-spacing: 1px; text-transform: uppercase; text-align: center; }

    .pc-info { flex: 1; display: flex; flex-direction: column; gap: 7px; overflow: hidden; min-height: 0; }

    /* Description */
    .pc-desc { font-family: var(--serif); font-size: 10px; color: var(--gray); line-height: 1.55; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 4; -webkit-box-orient: vertical; }

    /* Tableau gammes/prix */
    .pc-ranges { flex-shrink: 0; }
    .pc-ranges-title { font-size: 8px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--gold); margin-bottom: 5px; }
    .ranges-table { width: 100%; border-collapse: collapse; }
    .ranges-table tr { border-bottom: 1px dashed #f0f0f0; }
    .ranges-table tr:last-child { border-bottom: none; }
    .ranges-table td { padding: 3px 0; font-size: 10px; color: var(--black); }
    .ranges-table td.range-name { font-family: var(--serif); }
    .ranges-table td.range-dots { width: 100%; padding: 0 6px; }
    .ranges-table td.range-dots::after { content: ''; display: block; border-bottom: 1px dotted #ccc; margin-top: 6px; }
    .ranges-table td.range-price { font-family: var(--serif); font-size: 13px; font-weight: 700; white-space: nowrap; text-align: right; color: var(--black); }

    /* Sections génériques */
    .pc-section { flex-shrink: 0; }
    .pc-section-title { font-size: 8px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--gold); margin-bottom: 5px; }

    /* Tableau modules */
    .modules-table { width: 100%; border-collapse: collapse; font-size: 10px; }
    .modules-table th { font-size: 8px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--gold); border-bottom: 1px solid #e8e8e8; padding: 0 6px 4px 0; }
    .modules-table th.col-price { text-align: right; padding-left: 8px; border-left: 1px solid #e8e8e8; }
    .modules-table td { padding: 3px 6px 3px 0; border-bottom: 1px dashed #f0f0f0; color: var(--black); }
    .modules-table td.col-price { text-align: right; font-family: var(--serif); font-size: 11px; font-weight: 700; white-space: nowrap; padding-left: 8px; border-left: 1px solid #ececec; }
    .modules-table tr:last-child td { border-bottom: none; }
    .modules-table .col-module { font-family: var(--serif); }
    .modules-table .dim { font-size: 8px; color: var(--light); font-family: var(--sans); }

    /* Options */
    .pc-options { flex-shrink: 0; }
    .pc-options-title { font-size: 8px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--gold); margin-bottom: 5px; }
    .options-list { display: flex; flex-wrap: wrap; gap: 5px; }
    .opt-chip {
      border: 1px solid var(--gold);
      padding: 2px 8px;
      font-size: 7.5px; font-weight: 700;
      letter-spacing: 1px; text-transform: uppercase;
      color: var(--black);
      display: flex; align-items: center; gap: 4px;
    }
    .opt-chip-price { font-family: var(--serif); font-size: 9px; color: var(--gold); }

    /* ── PIED DE PAGE ── */
    .page-footer {
      border-top: 1px solid #d8d8d8;
      padding: 6px 22px;
      display: flex; align-items: center; justify-content: space-between;
      flex-shrink: 0;
    }
    .pf-left   { font-size: 7px; color: var(--light); line-height: 1.5; }
    .pf-center { font-size: 7px; color: #bbb; text-align: center; font-style: italic; }
    .pf-right  { font-size: 7px; color: var(--light); text-align: right; line-height: 1.5; }

    /* ── LOADING ── */
    #loading { padding: 60px; text-align: center; color: #999; font-size: 14px; }
  </style>
</head>
<body>

  <div class="toolbar">
    <span class="toolbar-title" id="toolbar-title">Catalogue client</span>
    <span class="toolbar-info" id="toolbar-info"></span>
    <div class="toolbar-actions">
      <button class="tbtn tbtn-pdf"   id="btn-save-pdf">📄 Sauvegarder PDF</button>
      <button class="tbtn tbtn-print" id="btn-print">🖨 Imprimer</button>
      <button class="tbtn tbtn-close" id="btn-close">✕ Fermer</button>
    </div>
  </div>

  <div id="loading">Chargement du catalogue…</div>
  <div class="catalogue-pages" id="catalogue-pages" style="display:none"></div>

  <script src="../shared/utils.js"></script>
  <script src="../shared/pricing.js"></script>
  <script src="./catalogue-client.js"></script>
</body>
</html>
