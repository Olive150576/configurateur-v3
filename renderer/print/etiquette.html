<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:">
  <title>Étiquette magasin</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --gold:  #c8a96e;
      --black: #1a1a1a;
      --gray:  #555;
      --light: #aaa;
      --sans:  -apple-system, 'Helvetica Neue', Arial, sans-serif;
      --serif: Georgia, 'Times New Roman', serif;
    }

    /* ── TOOLBAR ── */
    .toolbar {
      position: fixed; top: 0; left: 0; right: 0; height: 48px;
      background: #1e3a5f;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 20px; z-index: 9999; gap: 12px;
    }
    .toolbar-title { color: white; font-size: 13px; font-weight: 600; }
    .toolbar-actions { display: flex; gap: 8px; }
    .tbtn {
      padding: 5px 14px; border: none; border-radius: 4px;
      cursor: pointer; font-size: 12px; font-weight: 600;
    }
    .tbtn-pdf   { background: #f59e0b; color: #1a1a1a; }
    .tbtn-print { background: white;   color: #1e3a5f; }
    .tbtn-close { background: rgba(255,255,255,0.15); color: white; }

    body {
      font-family: var(--sans);
      background: #e8e8e8;
      padding-top: 48px;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }

    @media print {
      .toolbar { display: none !important; }
      body { background: white; padding-top: 0; }
    }

    @page { size: A4; margin: 0; }

    /* ── PAGE A4 ── */
    .page {
      width: 210mm;
      min-height: 297mm;
      background: white;
      display: flex;
      flex-direction: column;
      margin: 0 auto;
      box-shadow: 0 2px 20px rgba(0,0,0,0.18);
    }

    /* ── HEADER ── */
    .header {
      padding: 16px 28px 14px;
      border-bottom: 2px solid var(--gold);
      display: flex; align-items: center;
      justify-content: space-between; gap: 20px;
    }
    .logo-wrap img {
      height: 72px; width: 72px;
      object-fit: contain; display: block;
    }
    .logo-placeholder {
      width: 72px; height: 72px;
      background: #f0f0f0;
      display: flex; align-items: center; justify-content: center;
      color: #ccc; font-size: 9px; letter-spacing: 2px; text-transform: uppercase;
    }
    .header-right { text-align: right; }
    .collection-label {
      font-size: 11px; font-weight: 600;
      letter-spacing: 4px; text-transform: uppercase;
      color: var(--gold); margin-bottom: 5px;
    }
    .model-name {
      font-family: var(--serif);
      font-size: 52px; font-weight: 700;
      letter-spacing: 6px; text-transform: uppercase;
      color: var(--black); line-height: 1;
    }
    .model-subtitle {
      font-size: 11px; font-weight: 400;
      letter-spacing: 3px; text-transform: uppercase;
      color: var(--gray); margin-top: 6px;
    }

    /* ── FILET OR ── */
    .gold-rule {
      height: 2px;
      background: linear-gradient(to right, transparent, var(--gold), #e8c97e, var(--gold), transparent);
    }

    /* ── PHOTO ── */
    .photo-zone {
      height: 230px;
      background: #f7f7f7;
      display: flex; align-items: center; justify-content: center;
      position: relative; overflow: hidden;
    }
    .photo-zone img.product-img {
      max-height: 100%; max-width: 100%; object-fit: contain;
    }
    .photo-placeholder {
      display: flex; flex-direction: column;
      align-items: center; gap: 8px; color: #ccc;
    }
    .photo-placeholder svg { width: 48px; height: 48px; }
    .photo-placeholder span {
      font-size: 10px; letter-spacing: 3px;
      text-transform: uppercase; font-weight: 500;
    }
    .photo-badge {
      position: absolute; top: 14px; right: 14px;
      border: 1px solid var(--gold);
      background: rgba(255,255,255,0.92);
      padding: 5px 12px;
      font-size: 9px; font-weight: 700;
      letter-spacing: 2px; text-transform: uppercase;
      color: var(--gold);
    }

    /* ── BANDEAU TISSU ── */
    .fabric-band {
      border-top: 1px solid var(--gold);
      border-bottom: 1px solid var(--gold);
      padding: 7px 28px;
      display: flex; align-items: center;
      justify-content: center; gap: 12px;
    }
    .fabric-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--gold); }
    .fabric-text {
      font-size: 9px; font-weight: 600;
      letter-spacing: 3px; text-transform: uppercase; color: var(--black);
    }

    /* ── CONTENU ── */
    .content { flex: 1; display: flex; flex-direction: column; padding: 0 20px; }

    .config-title {
      text-align: center; font-size: 10px; font-weight: 600;
      letter-spacing: 3px; text-transform: uppercase;
      color: var(--gold); padding: 10px 0 8px;
    }

    /* ── GRILLE PRIX ── */
    .price-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px; padding-bottom: 12px;
    }
    .price-card {
      border: 1px solid #d8d8d8;
      border-top: 3px solid var(--gold);
      padding: 14px 10px 16px;
    }
    .card-name {
      font-family: var(--serif);
      font-size: 18px; font-weight: 700;
      letter-spacing: 1px; text-transform: uppercase;
      color: var(--black); margin-bottom: 2px; line-height: 1.2;
    }
    .card-dims { font-size: 10px; color: #999; margin-bottom: 8px; letter-spacing: 0; }
    .card-sep { border: none; border-top: 1px dashed #e8e8e8; margin-bottom: 10px; }
    .price-row {
      display: flex; align-items: flex-start;
      justify-content: space-between; margin-bottom: 8px;
    }
    .price-row:last-child { margin-bottom: 0; }
    .version-label { font-size: 13px; font-weight: 500; color: var(--gray); line-height: 1.3; }
    .price-block { text-align: right; }
    .price-amount {
      font-family: var(--serif);
      font-size: 28px; font-weight: 700;
      color: var(--black); line-height: 1; white-space: nowrap;
    }
    .price-amount sup { font-size: 15px; vertical-align: top; line-height: 1.4; }
    .price-ttc { font-size: 9px; color: var(--light); }
    .relax-badge {
      display: inline-block;
      border: 1px solid var(--gold); color: var(--gold);
      font-size: 10px; font-weight: 700;
      padding: 2px 6px; margin-top: 6px; letter-spacing: 1px;
    }

    /* ── BLOC BAS ── */
    .bottom-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 0; flex: 1;
      border-top: 1px solid #e8e8e8;
      padding: 12px 0;
    }
    .section-title {
      font-size: 11px; font-weight: 700;
      letter-spacing: 3px; text-transform: uppercase;
      color: var(--gold); margin-bottom: 10px;
    }
    .descriptif { padding-right: 14px; border-right: 1px solid #e8e8e8; }
    .desc-list { list-style: none; display: flex; flex-direction: column; gap: 4px; }
    .desc-list li {
      font-size: 11px; color: var(--black);
      line-height: 1.5; display: flex; gap: 6px;
    }
    .desc-list li::before { content: '—'; color: var(--gold); font-weight: 700; flex-shrink: 0; }

    .options { padding-left: 14px; }
    .option-item { margin-bottom: 12px; }
    .option-item:last-child { margin-bottom: 0; }
    .option-name {
      font-size: 13px; font-weight: 700;
      text-transform: uppercase; color: var(--black);
    }
    .option-desc { font-size: 11px; color: #999; margin: 1px 0 3px; }
    .option-price-row { display: flex; align-items: baseline; gap: 4px; }
    .option-price {
      font-family: var(--serif);
      font-size: 30px; font-weight: 700; color: var(--gold); line-height: 1;
    }
    .option-price sup { font-size: 16px; vertical-align: top; line-height: 1.3; }
    .option-unit { font-size: 11px; color: var(--light); }

    /* ── MODULES ── */
    .modules-band {
      padding: 8px 20px 10px;
      border-bottom: 1px solid #eeeeee;
    }
    .modules-band-title {
      font-size: 9px; font-weight: 700;
      letter-spacing: 2px; text-transform: uppercase;
      color: var(--gold); margin-bottom: 6px;
    }
    .modules-tiles {
      display: flex; flex-wrap: wrap; gap: 6px;
    }
    .module-tile {
      border: 1px solid var(--gold);
      padding: 6px 12px;
      min-width: 80px;
      text-align: center;
    }
    .module-tile-name {
      font-size: 11px; font-weight: 700;
      letter-spacing: 1px; text-transform: uppercase;
      color: var(--black);
    }
    .module-tile-dims {
      font-size: 9px; color: var(--gray);
      margin-top: 2px; letter-spacing: 0;
    }

    /* ── FOOTER ── */
    .footer {
      border-top: 1px solid #d8d8d8;
      padding: 8px 28px;
      display: grid; grid-template-columns: 1fr auto 1fr;
      align-items: center; gap: 10px;
      margin-top: auto;
    }
    .footer-left, .footer-right { font-size: 8px; color: var(--light); line-height: 1.5; }
    .footer-right { text-align: right; }
    .footer-center {
      font-size: 8px; font-weight: 700; color: var(--gold);
      letter-spacing: 1.5px; text-transform: uppercase;
      text-align: center; white-space: nowrap;
    }
  </style>
</head>
<body>

  <!-- Toolbar -->
  <div class="toolbar">
    <span class="toolbar-title" id="toolbar-title">Étiquette magasin</span>
    <div class="toolbar-actions">
      <button class="tbtn tbtn-pdf"   id="btn-save-pdf">📄 Sauvegarder PDF</button>
      <button class="tbtn tbtn-print" id="btn-print">🖨 Imprimer</button>
      <button class="tbtn tbtn-close" id="btn-close">✕ Fermer</button>
    </div>
  </div>

  <!-- Page étiquette -->
  <div class="page" id="etiquette-page">
    <div style="padding:40px;color:#999;text-align:center" id="loading">Chargement…</div>
  </div>

  <script src="../../shared/utils.js"></script>
  <script src="etiquette.js"></script>
</body>
</html>
