<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:">
  <title>Catalogue produits</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --gold:  #c8a96e;
      --black: #1a1a1a;
      --gray:  #555;
      --light: #aaa;
      --sans:  -apple-system, 'Helvetica Neue', Arial, sans-serif;
      --serif: Georgia, 'Times New Roman', serif;
    }

    /* ── TOOLBAR ── */
    .toolbar {
      position: fixed; top: 0; left: 0; right: 0; height: 48px;
      background: #1e3a5f;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 20px; z-index: 9999; gap: 12px;
    }
    .toolbar-title { color: white; font-size: 13px; font-weight: 600; }
    .toolbar-actions { display: flex; gap: 8px; align-items: center; }
    .tbtn {
      padding: 5px 14px; border: none; border-radius: 4px;
      cursor: pointer; font-size: 12px; font-weight: 600;
    }
    .tbtn-pdf   { background: #f59e0b; color: #1a1a1a; }
    .tbtn-print { background: white;   color: #1e3a5f; }
    .tbtn-close { background: rgba(255,255,255,0.15); color: white; }
    .toolbar-filter {
      display: flex; gap: 8px; align-items: center;
    }
    .toolbar-filter label { color: rgba(255,255,255,0.8); font-size: 12px; }
    .toolbar-filter select {
      padding: 3px 8px; border-radius: 4px; border: none;
      font-size: 12px; background: rgba(255,255,255,0.15); color: white;
    }
    .toolbar-filter select option { background: #1e3a5f; }

    body {
      font-family: var(--sans);
      background: #e8e8e8;
      padding-top: 56px;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }

    @media print {
      .toolbar { display: none !important; }
      body { background: white; padding-top: 0; }
      .catalogue-page { break-after: page; }
      .catalogue-page:last-child { break-after: avoid; }
    }

    @page { size: A4; margin: 0; }

    /* ── GRILLE CATALOGUE ── */
    .catalogue-pages { display: flex; flex-direction: column; gap: 12px; align-items: center; }

    .catalogue-page {
      width: 210mm;
      min-height: 297mm;
      background: white;
      box-shadow: 0 2px 20px rgba(0,0,0,0.18);
      display: flex;
      flex-direction: column;
    }

    /* ── ENTÊTE DE PAGE ── */
    .cat-header {
      padding: 14px 24px 12px;
      border-bottom: 2px solid var(--gold);
      display: flex; align-items: center; justify-content: space-between;
    }
    .cat-header-left { display: flex; align-items: center; gap: 14px; }
    .cat-logo img { height: 52px; width: 52px; object-fit: contain; }
    .cat-logo-placeholder {
      width: 52px; height: 52px; background: #f0f0f0;
      display: flex; align-items: center; justify-content: center;
      color: #ccc; font-size: 8px; letter-spacing: 1px;
    }
    .cat-header-title { font-size: 9px; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; color: var(--gold); }
    .cat-header-supplier { font-family: var(--serif); font-size: 22px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--black); line-height: 1.1; }
    .cat-header-right { text-align: right; }
    .cat-header-company { font-size: 10px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--gold); }
    .cat-header-addr { font-size: 8px; color: var(--light); line-height: 1.5; margin-top: 3px; }
    .cat-header-page { font-size: 8px; color: var(--light); margin-top: 4px; }

    .gold-rule {
      height: 2px;
      background: linear-gradient(to right, transparent, var(--gold), #e8c97e, var(--gold), transparent);
    }

    /* ── GRILLE FICHES ── */
    .products-grid {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
      padding: 0;
    }

    /* ── FICHE PRODUIT ── */
    .product-card {
      border-right: 1px solid #e8e8e8;
      border-bottom: 1px solid #e8e8e8;
      padding: 14px 16px;
      display: flex; flex-direction: column; gap: 8px;
    }
    .product-card:nth-child(2n) { border-right: none; }

    .pc-header { display: flex; gap: 10px; align-items: flex-start; }
    .pc-photo {
      width: 80px; height: 60px; flex-shrink: 0;
      background: #f7f7f7;
      display: flex; align-items: center; justify-content: center;
      border: 1px solid #e8e8e8; overflow: hidden;
    }
    .pc-photo img { width: 100%; height: 100%; object-fit: contain; }
    .pc-photo-placeholder { color: #ccc; font-size: 8px; letter-spacing: 1px; text-transform: uppercase; }

    .pc-info { flex: 1; }
    .pc-collection { font-size: 8px; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; color: var(--gold); margin-bottom: 2px; }
    .pc-name { font-family: var(--serif); font-size: 16px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--black); line-height: 1.1; }
    .pc-supplier { font-size: 9px; color: var(--gray); letter-spacing: 1px; margin-top: 2px; }
    .pc-desc { font-size: 9px; color: #777; line-height: 1.4; margin-top: 3px; }

    /* ── GAMMES (tarifs) ── */
    .pc-ranges { display: flex; flex-direction: column; gap: 4px; }
    .pc-range-row {
      display: flex; align-items: baseline; justify-content: space-between;
      padding: 3px 0; border-bottom: 1px dashed #f0f0f0;
    }
    .pc-range-row:last-child { border-bottom: none; }
    .pc-range-name { font-size: 9px; font-weight: 600; color: var(--gray); text-transform: uppercase; letter-spacing: 1px; }
    .pc-range-dims { font-size: 8px; color: #bbb; margin-left: 6px; }
    .pc-range-price { font-family: var(--serif); font-size: 18px; font-weight: 700; color: var(--black); white-space: nowrap; }
    .pc-range-price sup { font-size: 10px; vertical-align: top; line-height: 1.5; }
    .pc-range-ttc { font-size: 7px; color: var(--light); text-align: right; }

    /* ── FOOTER ── */
    .cat-footer {
      border-top: 1px solid #d8d8d8;
      padding: 6px 24px;
      display: flex; align-items: center; justify-content: space-between;
      margin-top: auto;
    }
    .cat-footer-left { font-size: 7px; color: var(--light); }
    .cat-footer-right { font-size: 7px; color: var(--gold); font-weight: 700; letter-spacing: 1px; text-transform: uppercase; }

    /* ── EMPTY / LOADING ── */
    #loading { padding: 60px; text-align: center; color: #999; font-size: 14px; }
  </style>
</head>
<body>

  <!-- Toolbar -->
  <div class="toolbar">
    <span class="toolbar-title" id="toolbar-title">Catalogue produits</span>
    <div class="toolbar-actions">
      <div class="toolbar-filter">
        <label>Trier par :</label>
        <select id="sort-select">
          <option value="name">Nom</option>
          <option value="collection">Collection</option>
          <option value="price-asc">Prix croissant</option>
          <option value="price-desc">Prix décroissant</option>
        </select>
      </div>
      <button class="tbtn tbtn-pdf"   id="btn-save-pdf">📄 Sauvegarder PDF</button>
      <button class="tbtn tbtn-print" id="btn-print">🖨 Imprimer</button>
      <button class="tbtn tbtn-close" id="btn-close">✕ Fermer</button>
    </div>
  </div>

  <div id="loading">Chargement du catalogue…</div>
  <div class="catalogue-pages" id="catalogue-pages" style="display:none"></div>

  <script src="../../shared/utils.js"></script>
  <script src="./catalogue.js"></script>
</body>
</html>
