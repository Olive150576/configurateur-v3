<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:">
  <title>Catalogue produits</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --gold:  #c8a96e;
      --black: #1a1a1a;
      --gray:  #555;
      --light: #aaa;
      --sans:  -apple-system, 'Helvetica Neue', Arial, sans-serif;
      --serif: Georgia, 'Times New Roman', serif;
    }

    /* ── TOOLBAR ── */
    .toolbar {
      position: fixed; top: 0; left: 0; right: 0; height: 48px;
      background: #1e3a5f;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 20px; z-index: 9999; gap: 12px;
    }
    .toolbar-title { color: white; font-size: 13px; font-weight: 600; flex: 1; }
    .toolbar-actions { display: flex; gap: 8px; align-items: center; }
    .tbtn {
      padding: 5px 14px; border: none; border-radius: 4px;
      cursor: pointer; font-size: 12px; font-weight: 600;
    }
    .tbtn-pdf   { background: #f59e0b; color: #1a1a1a; }
    .tbtn-print { background: white;   color: #1e3a5f; }
    .tbtn-close { background: rgba(255,255,255,0.15); color: white; }
    .toolbar-info { color: rgba(255,255,255,0.6); font-size: 11px; }

    body {
      font-family: var(--sans);
      background: #e8e8e8;
      padding-top: 56px;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }

    @media print {
      .toolbar { display: none !important; }
      body { background: white; padding-top: 0; }
      .cat-page { break-after: page; box-shadow: none; margin: 0; }
      .cat-page:last-child { break-after: avoid; }
    }

    @page { size: A4 portrait; margin: 0; }

    /* ── WRAPPER ── */
    .catalogue-pages { display: flex; flex-direction: column; gap: 12px; align-items: center; padding: 12px 0 24px; }

    /* ── PAGE A4 ── */
    .cat-page {
      width: 210mm;
      height: 297mm;
      background: white;
      box-shadow: 0 2px 20px rgba(0,0,0,0.18);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── HEADER ── */
    .cat-header {
      padding: 14px 26px 12px;
      border-bottom: 2px solid var(--gold);
      display: flex; align-items: center; justify-content: space-between; gap: 16px;
    }
    .cat-logo img, .cat-logo-ph {
      height: 56px; width: 56px; object-fit: contain; display: block;
    }
    .cat-logo-ph {
      background: #f0f0f0; display: flex; align-items: center; justify-content: center;
      color: #ccc; font-size: 8px; letter-spacing: 1px; text-transform: uppercase;
    }
    .cat-header-mid { flex: 1; padding: 0 20px; }
    .cat-collection { font-size: 9px; font-weight: 700; letter-spacing: 4px; text-transform: uppercase; color: var(--gold); margin-bottom: 3px; }
    .cat-product-name { font-family: var(--serif); font-size: 40px; font-weight: 700; letter-spacing: 4px; text-transform: uppercase; color: var(--black); line-height: 1; }
    .cat-supplier-name { font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: var(--gray); margin-top: 5px; }
    .cat-header-right { text-align: right; }
    .cat-company-name { font-size: 9px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--gold); }
    .cat-company-addr { font-size: 7.5px; color: var(--light); line-height: 1.6; margin-top: 3px; }
    .cat-page-num { font-size: 7.5px; color: var(--light); margin-top: 4px; }

    /* ── FILET ── */
    .gold-rule {
      height: 2px;
      background: linear-gradient(to right, transparent, var(--gold), #e8c97e, var(--gold), transparent);
      flex-shrink: 0;
    }

    /* ── ZONE PHOTO + DESCRIPTION ── */
    .cat-body { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

    .cat-top { display: flex; gap: 0; height: 180px; flex-shrink: 0; border-bottom: 1px solid #e8e8e8; }

    .cat-photo {
      width: 220px; flex-shrink: 0;
      background: #f7f7f7;
      display: flex; align-items: center; justify-content: center;
      border-right: 1px solid #e8e8e8; overflow: hidden;
    }
    .cat-photo img { max-width: 100%; max-height: 100%; object-fit: contain; }
    .cat-photo-ph { color: #ccc; font-size: 9px; letter-spacing: 2px; text-transform: uppercase; text-align: center; }

    .cat-description { flex: 1; padding: 16px 20px; display: flex; flex-direction: column; gap: 10px; overflow: hidden; }
    .cat-desc-title { font-size: 9px; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; color: var(--gold); }
    .cat-desc-list { list-style: none; display: flex; flex-direction: column; gap: 4px; }
    .cat-desc-list li { font-family: var(--serif); font-size: 11px; color: var(--black); line-height: 1.5; display: flex; gap: 6px; }
    .cat-desc-list li::before { content: '—'; color: var(--gold); font-weight: 700; flex-shrink: 0; }
    .cat-notes { font-size: 9px; color: #bbb; font-style: italic; margin-top: auto; }

    /* ── MODULES ── */
    .cat-section-title { font-size: 9px; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; color: var(--gold); margin-bottom: 10px; }
    .cat-modules { flex-shrink: 0; border-bottom: 1px solid #e8e8e8; padding: 10px 26px; }
    .modules-table { width: 100%; border-collapse: collapse; font-size: 11px; }
    .modules-table th {
      text-align: left; font-size: 9px; font-weight: 700; letter-spacing: 1px;
      text-transform: uppercase; color: var(--gold);
      border-bottom: 1px solid #e8e8e8; padding: 0 8px 6px 0;
    }
    .modules-table th.right { text-align: right; padding-right: 0; padding-left: 10px; border-left: 1px solid #e0e0e0; }
    .modules-table td { padding: 5px 8px 5px 0; border-bottom: 1px dashed #f0f0f0; color: var(--black); vertical-align: middle; }
    .modules-table td.right { text-align: right; padding-right: 4px; padding-left: 10px; border-left: 1px solid #ececec; }
    .modules-table td.price-cell { font-family: var(--serif); font-size: 12px; font-weight: 700; white-space: nowrap; }
    .modules-table td.dims-cell { font-size: 9px; color: var(--light); }
    .modules-table tr:last-child td { border-bottom: none; }

    /* ── OPTIONS ── */
    .cat-options { padding: 10px 26px; }
    .options-list { display: flex; flex-wrap: wrap; gap: 8px; }
    .opt-chip {
      border: 1px solid var(--gold);
      padding: 3px 10px;
      font-size: 8px; font-weight: 700;
      letter-spacing: 1px; text-transform: uppercase;
      color: var(--black);
      display: flex; align-items: center; gap: 5px;
    }
    .opt-chip-price { font-family: var(--serif); font-size: 10px; color: var(--gold); }

    /* ── FOOTER ── */
    .cat-footer {
      border-top: 1px solid #d8d8d8;
      padding: 7px 26px;
      display: flex; align-items: center; justify-content: space-between;
      margin-top: auto; flex-shrink: 0;
    }
    .cat-footer-left { font-size: 7px; color: var(--light); line-height: 1.5; }
    .cat-footer-center { font-size: 7px; font-weight: 700; color: var(--gold); letter-spacing: 1.5px; text-transform: uppercase; text-align: center; }
    .cat-footer-right { font-size: 7px; color: var(--light); text-align: right; line-height: 1.5; }

    /* ── LOADING / EMPTY ── */
    #loading { padding: 60px; text-align: center; color: #999; font-size: 14px; }
  </style>
</head>
<body>

  <div class="toolbar">
    <span class="toolbar-title" id="toolbar-title">Catalogue produits</span>
    <span class="toolbar-info" id="toolbar-info"></span>
    <div class="toolbar-actions">
      <button class="tbtn tbtn-pdf"   id="btn-save-pdf">📄 Sauvegarder PDF</button>
      <button class="tbtn tbtn-print" id="btn-print">🖨 Imprimer</button>
      <button class="tbtn tbtn-close" id="btn-close">✕ Fermer</button>
    </div>
  </div>

  <div id="loading">Chargement du catalogue…</div>
  <div class="catalogue-pages" id="catalogue-pages" style="display:none"></div>

  <script src="../../shared/utils.js"></script>
  <script src="./catalogue.js"></script>
</body>
</html>
